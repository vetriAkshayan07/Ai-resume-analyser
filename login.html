<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AI Resume Screening</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-robot"></i></div>
      <div class="logo-text">
        RecruitAI
        <small>Resume Screening System</small>
      </div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'info' }} alert-dismissible mb-3" style="border-radius:10px; font-size:13.5px;">
          {{ message }}
          <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your admin account to continue.</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="border-radius:10px 0 0 10px; border:1.5px solid #e0e0e0; background:#f8f9ff;">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Enter your username" required autocomplete="username"
                 style="border-left:none; border-radius:0 10px 10px 0;" />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="border-radius:10px 0 0 10px; border:1.5px solid #e0e0e0; background:#f8f9ff;">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Enter your password" required autocomplete="current-password"
                 style="border-left:none; border-radius:0 10px 10px 0;" />
        </div>
      </div>

      <button type="submit" class="btn-auth">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-switch mt-3">
      New admin? <a href="{{ url_for('register') }}">Create Account</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
